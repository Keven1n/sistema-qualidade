{% extends "base.html" %}

{% block title %}Erro {{ status_code }}{% endblock %}

{% block content %}
<div class="main-container" style="display: flex; align-items: center; justify-content: center; min-height: 60vh;">
  <div class="form-card" style="max-width: 450px; text-align: center; padding: 3rem;">
    <div class="brand-logo" style="margin: 0 auto 1.5rem; width: 80px; height: 80px; background: rgba(6, 182, 212, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
    </div>
    
    <h1 style="font-size: 3rem; margin-bottom: 0.5rem; color: var(--primary);">{{ status_code }}</h1>
    <h2 style="margin-bottom: 1rem; color: var(--text);">{{ msg }}</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">{{ detalhe }}</p>
    
    <div style="display: flex; flex-direction: column; gap: 1rem;">
      <a href="/" class="btn btn-primary" style="width: 100%;">Voltar ao Painel</a>
      <a href="javascript:history.back()" class="btn btn-secondary" style="width: 100%;">Tentar Novamente</a>
    </div>
  </div>
</div>
{% endblock %}
