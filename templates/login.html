<!DOCTYPE html>
<html lang="pt-BR">
<head>
 <meta charset="UTF-8"/>
 <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
 <title>Login — Sistema de Qualidade</title>
 <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body class="login-body">
 <div class="login-card">
 <div class="login-header">
 <div class="login-icon"></div>
 <h1>Sistema de Qualidade</h1>
 <p>Controle de Soldagem</p>
 </div>

 {% if erro %}
 <div class="alert alert-error">{{ erro }}</div>
 {% endif %}

 <form method="post" action="/login">
 <div class="form-group">
 <label> Usuário</label>
 <input type="text" name="usuario" required autofocus/>
 </div>
 <div class="form-group">
 <label> Senha</label>
 <input type="password" name="senha" required/>
 </div>
 <button type="submit" class="btn btn-primary btn-full">Entrar</button>
 </form>

 <div class="login-divider">ou</div>

 <form method="post" action="/login-demo">
 <button type="submit" class="btn btn-secondary btn-full"> Entrar como Visitante (Demo)</button>
 </form>
 <p class="login-caption"> Modo demo: navegação e consulta apenas, sem salvar dados.</p>
 </div>
</body>
</html>
