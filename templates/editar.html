{% extends "base.html" %}
{% set active = "historico" %}
{% block title %}Editar Registro — Qualidade{% endblock %}

{% block content %}
<div class="page-header">
 <h2>Editar Registro #{{ row.id }}</h2>
 <a href="/historico" class="btn btn-secondary">Voltar</a>
</div>

<form method="post" action="/editar/{{ row.id }}" class="form-card">
 <input type="hidden" name="csrf_token" value="{{ csrf_token(sessao) }}"/>

 <div class="form-row">
  <div class="form-group">
   <label>O.S.</label>
   <input type="text" name="os_num" value="{{ row.os }}" required/>
  </div>
  <div class="form-group">
   <label>Soldador</label>
   <select name="soldador" required>
    {% for s in soldadores %}
    <option {% if row.soldador == s %}selected{% endif %}>{{ s }}</option>
    {% endfor %}
   </select>
  </div>
 </div>

 <div class="form-row">
  <div class="form-group">
   <label>Processo</label>
   <select name="processo">
    {% for p in processos %}
    <option {% if row.processo == p %}selected{% endif %}>{{ p }}</option>
    {% endfor %}
   </select>
  </div>
  <div class="form-group">
   <label>Status</label>
   <div class="radio-group">
    <label><input type="radio" name="status_ins" value="Aprovado"
     {% if row.status=="Aprovado" %}checked{% endif %}/> Aprovado</label>
    <label><input type="radio" name="status_ins" value="Reprovado / Retrabalho"
     {% if row.status=="Reprovado / Retrabalho" %}checked{% endif %}/> Reprovado</label>
   </div>
  </div>
 </div>

 <div class="form-group">
  <label>Defeitos</label>
  <input type="text" name="defeitos" value="{{ row.defeitos }}"/>
 </div>

 <div class="form-group">
  <label>Observações</label>
  <textarea name="obs" rows="3" maxlength="2000">{{ row.obs }}</textarea>
 </div>

 <div class="form-actions">
  <button type="submit" class="btn btn-primary">Salvar Alterações</button>
  <a href="/historico" class="btn btn-secondary">Cancelar</a>
 </div>

</form>
{% endblock %}
